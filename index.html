            setTimeout(askQuestion, 800);
            window.scrollTo({ top: 0 });
        }

        function addChatBubble(sender, text) {
            const history = document.getElementById('chat-history');
            const wrap = document.createElement('div');
            wrap.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} fade-in-up`;
            let bubbleHTML = '';
            if (sender === 'ai') {
                bubbleHTML = `
                    <div class="flex gap-3 max-w-[90%] md:max-w-[80%]">
                        <div class="w-10 h-10 rounded-full bg-gold flex items-center justify-center text-black shrink-0">
                            <i class="fa-solid fa-graduation-cap"></i>
                        </div>
                        <div class="chat-bubble-ai px-5 py-3.5 text-[15px] leading-relaxed shadow-sm">${text}</div>
                    </div>`;
            } else {
                bubbleHTML = `<div class="chat-bubble-user px-5 py-3.5 text-[15px] leading-relaxed shadow-sm max-w-[85%] font-medium">${text}</div>`;
            }
            wrap.innerHTML = bubbleHTML;
            history.appendChild(wrap);
            history.scrollTo({ top: history.scrollHeight, behavior: 'smooth' });
        }

        function askQuestion() {
            const qs = activeQuestions();
            if (step < qs.length) {
                const q = qs[step];
                addChatBubble('ai', q.q);
                if (q.key === 'major' && track === 'pg') { renderMajorCategories(); return; }
                const c = document.getElementById('options-container');
                c.innerHTML = '';
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = OPT_BTN_CLASS;
                    btn.innerText = opt.label;
                    btn.onclick = () => handleAnswer(opt.value, opt.label);
                    c.appendChild(btn);
                });
                if (q.note) {
                    const note = document.createElement('p');
                    note.className = 'text-[13px] text-gray-500 leading-relaxed text-center sm:col-span-2 mt-1';
                    note.innerText = q.note;
                    c.appendChild(note);
                }
            } else {
                document.getElementById('options-container').innerHTML = '';
                addChatBubble('ai', '정보 입력이 완료되었습니다. 최신 26/27 영국 입시 데이터를 바탕으로 결과를 분석 중입니다...');
                setTimeout(showResult, 1800);
            }
        }

        function handleAnswer(value, label) {
            if (value === '__other__') {
                addChatBubble('user', label);
                document.getElementById('options-container').innerHTML = '';
                addChatBubble('ai', '보유하신 시험 종류를 선택해주세요. 입력하신 총점을 IELTS 밴드로 환산해 드립니다.');
                setTimeout(renderTestTypeChoice, 500);
                return;
            }
            addChatBubble('user', label);
            document.getElementById('options-container').innerHTML = '';
            const q = activeQuestions()[step];
            currentState[q.key] = value;
            step++;
            setTimeout(askQuestion, 600);
        }

        function renderMajorCategories() {
            const c = document.getElementById('options-container');

            Object.keys(majorCategories).forEach(cat => {

                b.className = OPT_BTN_CLASS;
                b.innerText = cat;

                    addChatBubble('user', cat);
                    addChatBubble('ai', `<strong>${cat}</strong>을 선택하셨네요. 이제 세부 전공을 선택해주세요.`);
                    renderMajorList(cat);
                };
                c.appendChild(b);
            });
        }
        function renderMajorList(cat) {
            const c = document.getElementById('options-container');
            c.innerHTML = '';
            majorCategories[cat].forEach(m => {
                const b = document.createElement('button');
                b.className = OPT_BTN_CLASS;
                b.innerText = m;
                b.onclick = () => handleAnswer(m, m);
                c.appendChild(b);
            });
            const back = document.createElement('button');
            back.className = 'pill-btn bg-transparent text-gray-400 border border-[#3d3d40] hover:bg-[#2d2d2f] py-3.5 px-4 font-medium text-[14px] md:text-[15px] w-full sm:col-span-2';

        // ── 영어 점수 환산기 ─────────────────────────────────────────
        function renderTestTypeChoice() {
            const c = document.getElementById('options-container');
            c.innerHTML = '';
            [['TOEFL iBT (0~120)', 'TOEFL'], ['PTE Academic (10~90)', 'PTE']].forEach(([lbl, type]) => {
                const b = document.createElement('button');
                b.className = OPT_BTN_CLASS;
                b.innerText = lbl;
                b.onclick = () => renderScoreInput(type);
                c.appendChild(b);
            });
            const back = document.createElement('button');
            back.className = 'pill-btn bg-transparent text-gray-400 border border-[#3d3d40] hover:bg-[#2d2d2f] py-3.5 px-4 font-medium text-[14px] md:text-[15px] w-full sm:col-span-2';
            back.innerText = '← 성적 선택으로 돌아가기';
            back.onclick = () => {
                c.innerHTML = '';
                activeQuestions()[step].options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = OPT_BTN_CLASS;
                    btn.innerText = opt.label;
                    btn.onclick = () => handleAnswer(opt.value, opt.label);

        function renderScoreInput(testType) {
            const c = document.getElementById('options-container');
            c.innerHTML = '';
            const min = testType === 'TOEFL' ? 0 : 10;
            const max = testType === 'TOEFL' ? 120 : 90;
            const wrap = document.createElement('div');
            wrap.className = 'sm:col-span-2 flex flex-col gap-3';
            wrap.innerHTML = `
                <input id="engScoreInput" type="number" inputmode="numeric" min="${min}" max="${max}"
                    placeholder="${testType} 총점을 입력하세요 (${min}~${max})"
                    class="bg-[#2d2d2f] text-white border border-[#3d3d40] rounded-2xl py-3.5 px-5 text-[15px] focus:outline-none focus:border-gold w-full placeholder-gray-500" />

                    <button id="engConvertBtn" class="pill-btn bg-gold hover:bg-gold-deep text-black py-3.5 px-4 font-semibold text-[15px] flex-1">IELTS로 환산하기</button>
                    <button id="engBackBtn" class="pill-btn bg-[#2d2d2f] text-gray-300 border border-[#3d3d40] hover:bg-[#3d3d40] py-3.5 px-5 font-medium text-[15px]">← 뒤로</button>
                </div>`;
            c.appendChild(wrap);
            document.getElementById('engConvertBtn').onclick = () => convertEnglish(testType);
            document.getElementById('engBackBtn').onclick = renderTestTypeChoice;
            document.getElementById('engScoreInput').focus();
        }

        function convertEnglish(testType) {
            const input = document.getElementById('engScoreInput');
            const s = parseInt(input.value, 10);
            const min = testType === 'TOEFL' ? 0 : 10;
            const max = testType === 'TOEFL' ? 120 : 90;
            if (isNaN(s) || s < min || s > max) { input.value = ''; input.placeholder = `유효한 점수를 입력하세요 (${min}~${max})`; return; }
            const ielts = testType === 'TOEFL' ? toeflToIelts(s) : pteToIelts(s);
            const q = activeQuestions()[step];
            const band = q.bandOf(ielts);
            const bandLabel = q.options.find(o => o.value === band).label;
            addChatBubble('user', `${testType} ${s}점`);
            addChatBubble('ai', `${testType} ${s}점은 <strong>IELTS 약 ${ielts.toFixed(1)}</strong>에 해당합니다. "${bandLabel}" 구간으로 분석을 진행할게요.`);
            document.getElementById('options-container').innerHTML = '';
            currentState[q.key] = band;
            currentState.ieltsEq = ielts;
            step++;
            setTimeout(askQuestion, 900);
        }
